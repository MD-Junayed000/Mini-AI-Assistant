global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yaml

scrape_configs:
  - job_name: 'mini-ai-assistant'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service: 'mini-ai-assistant'

  - job_name: 'chroma'
    static_configs:
      - targets: ['localhost:8000']  # our app exposes /healthz-derived gauge
        labels:
          service: 'chroma'
