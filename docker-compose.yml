# One service, one image, one port. The Dockerfile builds the React SPA and
# the FastAPI app together, then runs uvicorn on :8000. FastAPI serves both
# the API routes and the built /web/dist as static files.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-ai-assistant:latest
    container_name: mini-ai-assistant
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Override any of these in a .env file or your shell. Sensible local
      # defaults are baked into the app; only set what you need.
      APP_ENV: production
      LOG_LEVEL: INFO
    volumes:
      # Persist user uploads and the Chroma index across container restarts.
      - ./data:/app/data
      - chroma-data:/app/.chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  chroma-data: